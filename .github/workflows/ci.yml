name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {} # deny by default

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout-code clones repo
    steps:
      - name: checkout-code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # CI doesn't push; no need to persist token

      - name: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: install-node-dependencies
        run: npm ci

      - name: format-check
        run: npm run format

      - name: lint-css
        run: npx stylelint "src/**/*.css"

      - name: lint-md
        run: npx markdownlint-cli2 "**/*.md"

      - name: spell
        run: npm run spell

      - name: build
        run: npm run build

      - name: verify-build-artifacts
        run: |
          if ! git diff --quiet -- dist/ badges/; then
            echo "::error::dist/ or badges/ stale — run 'npm run build' and commit"
            git --no-pager diff --stat -- dist/ badges/
            git --no-pager diff -- dist/ badges/ | head -200
            exit 1
          fi
          echo "✓ dist/ + badges/ match fresh build"
