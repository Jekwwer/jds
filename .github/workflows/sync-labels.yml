# Reusable workflow_call. Consumer template: examples/sync-jds-labels.yml.
# Source: dist/labels.yml (generated by scripts/build-labels.mjs, don't hand-edit).
name: sync-labels

on:
  workflow_call:
    inputs:
      ref:
        description:
          'JDS version to sync from. Tag like "v0.1.0" (stable) or "main" (latest).'
        required: false
        type: string
        default: 'main'

permissions: {} # deny by default

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write # github-label-sync creates/updates/deletes labels via REST API
    steps:
      - name: fetch-labels
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Jekwwer/jds
          ref: ${{ inputs.ref }}
          path: jds
          sparse-checkout: dist/labels.yml
          sparse-checkout-cone-mode: false
          persist-credentials: false # checkout is read-only; github-label-sync auths separately

      - name: sync-labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes github-label-sync \
            --access-token "$GITHUB_TOKEN" \
            --allow-added-labels \
            --labels jds/dist/labels.yml \
            "${{ github.repository }}"
