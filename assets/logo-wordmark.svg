<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" fill="currentColor" role="img" aria-label="jds">
  <style>
    @keyframes jds-blink {
      0%, 65%   { opacity: 1; }
      75%, 95%  { opacity: 0; }
      100%      { opacity: 1; }
    }
    .jds-caret { animation: jds-blink 1.1s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .jds-caret { animation: none; }
    }
  </style>
  <text x="0" y="46" font-family="&#39;Geist Mono&#39;, ui-monospace, monospace" font-weight="600" font-size="42" letter-spacing="-0.02em">jds</text>
  <rect class="jds-caret" x="86" y="16" width="14" height="32"></rect>
</svg>